name: Documentation Improvement
description: Report a documentation issue or propose a documentation improvement.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: input
    id: repository
    attributes:
      label: Repository
      description: Which PeakURL repository or documentation area is affected?
      placeholder: PeakURL/PeakURL or peakurl.org/docs
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Current Issue
      description: What is unclear, missing, or incorrect?
    validations:
      required: true
  - type: textarea
    id: change
    attributes:
      label: Suggested Improvement
      description: What would make the documentation more useful?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Links, screenshots, or affected audiences.
