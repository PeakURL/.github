name: Bug Report
description: Report a reproducible bug in a PeakURL project.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please keep the report focused and reproducible.
  - type: input
    id: repository
    attributes:
      label: Repository
      description: Which PeakURL repository is affected?
      placeholder: PeakURL/PeakURL
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug clearly and directly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include versions, hosting context, browser, or other relevant details.
  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Logs, screenshots, or extra context.
